version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: helphub-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: helphub

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: helphub-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/helphub
      - PORT=5000
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: helphub-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  mongodb_data:
